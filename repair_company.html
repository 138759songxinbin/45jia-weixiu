<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维修公司待处理项目</title>
    <style>
        body{max-width:1000px;margin:30px auto;padding:20px;font-family:微软雅黑;}
        .repair-item{border:1px solid #ddd;padding:20px;margin:15px 0;border-radius:8px;background:#fff;}
        .wait{color:red;font-weight:bold;}
        .done{color:green;font-weight:bold;}
        button{padding:10px 20px;margin:5px;border:none;border-radius:4px;cursor:pointer;}
        .btn-done{background:#22c55e;color:white;}
    </style>
</head>
<body>
    <h2>🔧 维修公司待处理项目</h2>
    <div id="repairList">加载中...</div>
    <script>
        function loadRepairList() {
            let box = document.getElementById("repairList");
            let list = JSON.parse(localStorage.getItem("repairList") || "[]");
            if (list.length === 0) { box.innerHTML = "<p>暂无待维修项目</p>"; return; }
            let html = "";
            list.forEach((item, index) => {
                html += `
                <div class="repair-item">
                    <p><strong>报修时间：</strong>${item.createTime}</p>
                    <p><strong>报修人：</strong>${item.name}</p>
                    <p><strong>电话：</strong>${item.phone}</p>
                    <p><strong>地点：</strong>${item.place}</p>
                    <p><strong>类型：</strong>${item.type}</p>
                    <p><strong>问题：</strong>${item.content}</p>
                    <p><strong>状态：</strong><span class="${item.status==='待维修'?'wait':'done'}">${item.status}</span></p>
                    ${item.status !== "已完成" ? `<button class="btn-done" onclick="markDone(${index})">标记维修完成</button>` : ""}
                </div>`;
            });
            box.innerHTML = html;
        }
        function markDone(index) {
            let list = JSON.parse(localStorage.getItem("repairList") || "[]");
            list[index].status = "已完成";
            list[index].fixTime = new Date().toLocaleString();
            localStorage.setItem("repairList", JSON.stringify(list));
            alert("已标记为维修完成！");
            loadRepairList();
        }
        window.onload = loadRepairList;
        setInterval(loadRepairList, 5000);
    </script>
</body>
</html>
