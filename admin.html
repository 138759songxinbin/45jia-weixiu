<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>维修管理后台</title>
    <style>
        body{max-width:700px;margin:20px auto;padding:20px;font-family:微软雅黑;}
        .item{border:1px solid #ddd;padding:15px;margin:10px 0;border-radius:6px;}
        .status{color:red;font-weight:bold;}
    </style>
</head>
<body>
    <h2>📋 全部报修记录（管理员）</h2>
    <div id="list">加载中...</div>

    <script>
        const CLOUD_URL = "https://api.jsonbin.io/v3/b/67f9e6a6acd18771c0736198";

        async function load() {
            let res = await fetch(CLOUD_URL);
            let json = await res.json();
            let list = json.record.list || [];

            if (list.length === 0) {
                document.getElementById("list").innerHTML = "<p>暂无报修</p>";
                return;
            }

            let html = "";
            list.forEach(item => {
                html += `
                <div class="item">
                    <p>姓名：${item.name}</p>
                    <p>电话：${item.phone}</p>
                    <p>类别：${item.type}</p>
                    <p>地点：${item.place}</p>
                    <p>问题：${item.content}</p>
                    <p>时间：${item.time}</p>
                    <p class="status">状态：${item.status}</p>
                </div>`;
            });

            document.getElementById("list").innerHTML = html;
        }

        load();
        setInterval(load, 5000); // 自动刷新
    </script>
</body>
</html>
