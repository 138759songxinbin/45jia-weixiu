<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>维修管理后台</title>
    <style>
        body{padding:20px; font-family:微软雅黑;}
        .item{border:1px solid #ddd; padding:10px; margin:10px 0;}
    </style>
</head>
<body>
    <h2>全部报修记录（管理员）</h2>
    <div id="list"></div>

    <script>
        async function load(){
            const res = await fetch("https://jsonblob.com/api/jsonBlob/1111111111111111111");
            const data = await res.json();
            const list = data.list || [];
            const html = list.map(i=>`
                <div class="item">
                    <p>姓名：${i.name}</p>
                    <p>电话：${i.phone}</p>
                    <p>地点：${i.place}</p>
                    <p>问题：${i.content}</p>
                    <p>时间：${i.time}</p>
                </div>
            `).join("");
            document.getElementById("list").innerHTML = html;
        }
        load();
    </script>
</body>
</html>
