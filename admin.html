<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>维修管理后台</title>
    <style>
        body {
            font-family: "微软雅黑", sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: 0 auto;
        }
        .item {
            border: 1px solid #eee;
            padding: 15px;
            margin: 10px 0;
            border-radius: 6px;
        }
        .empty {
            color: #666;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h2>📋 全部维修记录</h2>
    <div id="content"></div>

    <script>
        // 页面加载时自动读取数据
        window.onload = function showData() {
            var content = document.getElementById("content");
            var data = localStorage.getItem("repairs");

            // 无数据时显示提示
            if (!data) {
                content.innerHTML = '<p class="empty">暂无报修记录</p>';
                return;
            }

            try {
                var arr = JSON.parse(data);
                var html = "";

                // 遍历所有报修记录
                for (var i = 0; i < arr.length; i++) {
                    var item = arr[i];
                    html += '<div class="item">' +
                        '<p><strong>姓名：</strong>' + (item.name || "未填写") + '</p>' +
                        '<p><strong>电话：</strong>' + (item.phone || "未填写") + '</p>' +
                        '<p><strong>类别：</strong>' + (item.type || "未填写") + '</p>' +
                        '<p><strong>地点：</strong>' + (item.place || "未填写") + '</p>' +
                        '<p><strong>问题：</strong>' + (item.content || "未填写") + '</p>' +
                        '<p><strong>状态：</strong>' + (item.status || "待维修") + '</p>' +
                        '<p><strong>时间：</strong>' + (item.createTime ? new Date(item.createTime).toLocaleString() : "无时间") + '</p>' +
                        '</div>';
                }

                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = '<p class="empty">数据格式错误，请检查报修记录</p>';
                console.error(e);
            }
        };
    </script>
</body>
</html>
