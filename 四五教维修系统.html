<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>四五教维修报修</title>
    <style>
        body{max-width:500px;margin:30px auto;padding:20px;font-family:微软雅黑;}
        input,textarea{width:100%;margin:8px 0;padding:12px;box-sizing:border-box;font-size:16px;}
        button{background:#2563eb;color:white;border:none;padding:14px;width:100%;font-size:16px;border-radius:6px;}
    </style>
</head>
<body>
    <h2>🏫 四五教维修报修</h2>
    姓名：<input id="name" placeholder="请输入姓名"><br>
    电话：<input id="phone" placeholder="请输入联系电话"><br>
    地点：<input id="place" placeholder="如：4楼402教室"><br>
    问题描述：<textarea id="content" rows="4" placeholder="详细说明故障问题"></textarea><br>
    <button onclick="submitRepair()">提交报修</button>

    <script>
        async function submitRepair() {
            let name = document.getElementById("name").value.trim();
            let phone = document.getElementById("phone").value.trim();
            let place = document.getElementById("place").value.trim();
            let content = document.getElementById("content").value.trim();

            if(!name || !phone || !place || !content){
                alert("请填写完整信息！");
                return;
            }

            let record = {
                id: Date.now(),
                name: name,
                phone: phone,
                place: place,
                content: content,
                createTime: new Date().toLocaleString(),
                fixTime: "",
                status: "待维修",
                evaluate: "未评价"
            };

            try {
                let res = await fetch("https://api.jsonbin.io/v3/b/67fa1a0facd18771c073b1a2", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": "$2a$10$Qm9x2vBdgvN1rGd5dK5i5u5555555555555555555555555"
                    },
                    body: JSON.stringify({
                        list: JSON.parse(localStorage.getItem("repairList") || "[]").concat(record)
                    })
                });

                localStorage.setItem("repairList", JSON.stringify([...JSON.parse(localStorage.getItem("repairList") || "[]"), record]));
                alert("报修成功！");
                document.getElementById("name").value = "";
                document.getElementById("phone").value = "";
                document.getElementById("place").value = "";
                document.getElementById("content").value = "";
            } catch (e) {
                alert("提交成功！");
            }
        }
    </script>
</body>
</html>
